<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoLife - Gestion de Tâches Professionnelle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="main-container">
        <!-- Notification Container -->
        <div class="notification-container" id="notification-container"></div>

        <!-- App Header -->
        <header class="app-header">
            <h1 class="app-title">TodoLife Pro</h1>
            <div class="app-controls">
                <select class="language-selector" id="language-selector">
                    <option value="fr">🇫🇷 Français</option>
                    <option value="en">🇬🇧 English</option>
                    <option value="es">🇪🇸 Español</option>
                    <option value="de">🇩🇪 Deutsch</option>
                </select>
                <button class="theme-toggle" id="theme-toggle">
                    <i class="bi bi-moon-fill"></i>
                </button>
            </div>
        </header>

        <!-- Stats Section -->
        <section class="stats-container">
            <div class="stat-card">
                <div class="stat-icon text-primary">
                    <i class="bi bi-list-task"></i>
                </div>
                <div class="stat-number" id="total-tasks">0</div>
                <div class="stat-label" data-i18n="totalTasks">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon text-warning">
                    <i class="bi bi-hourglass-split"></i>
                </div>
                <div class="stat-number" id="pending-tasks">0</div>
                <div class="stat-label" data-i18n="pendingTasks">Pending Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon text-success">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <div class="stat-number" id="completed-tasks">0</div>
                <div class="stat-label" data-i18n="completedTasks">Completed Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon text-danger">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <div class="stat-number" id="overdue-tasks">0</div>
                <div class="stat-label" data-i18n="overdueTasks">Overdue Tasks</div>
            </div>
        </section>

        <!-- Task Form -->
        <section class="task-form-container">
            <h2 class="mb-4" data-i18n="addNewTask">Add New Task</h2>
            <form id="task-form">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="task-title" class="form-label" data-i18n="taskTitle">Task Title</label>
                            <input type="text" class="form-control" id="task-title" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="task-category" class="form-label" data-i18n="category">Category</label>
                            <select class="form-select" id="task-category">
                                <option value="work" data-i18n="work">Work</option>
                                <option value="personal" data-i18n="personal">Personal</option>
                                <option value="shopping" data-i18n="shopping">Shopping</option>
                                <option value="health" data-i18n="health">Health</option>
                                <option value="other" data-i18n="other">Other</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="task-priority" class="form-label" data-i18n="priority">Priority</label>
                            <select class="form-select" id="task-priority">
                                <option value="low" data-i18n="low">Low</option>
                                <option value="medium" data-i18n="medium">Medium</option>
                                <option value="high" data-i18n="high">High</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="task-due-date" class="form-label" data-i18n="dueDate">Due Date</label>
                            <input type="date" class="form-control" id="task-due-date">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="task-description" class="form-label" data-i18n="description">Description</label>
                    <textarea class="form-control" id="task-description" rows="3"></textarea>
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-2"></i>
                        <span data-i18n="addTask">Add Task</span>
                    </button>
                </div>
            </form>
        </section>

        <!-- Tasks Section -->
        <section class="tasks-container">
            <div class="tasks-header">
                <h2 class="tasks-title" data-i18n="myTasks">My Tasks</h2>
                <div class="filter-container">
                    <button class="filter-btn active" data-filter="all" data-i18n="all">All</button>
                    <button class="filter-btn" data-filter="active" data-i18n="active">Active</button>
                    <button class="filter-btn" data-filter="completed" data-i18n="completed">Completed</button>
                    <button class="filter-btn" data-filter="overdue" data-i18n="overdue">Overdue</button>
                </div>
            </div>
            <ul class="task-list" id="task-list">
                <!-- Tasks will be dynamically added here -->
            </ul>
            <div class="empty-state" id="empty-state">
                <i class="bi bi-clipboard-x"></i>
                <p data-i18n="noTasks">No tasks found. Add a new task to get started!</p>
            </div>
        </section>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal fade" id="editTaskModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" data-i18n="editTask">Edit Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-task-form">
                        <input type="hidden" id="edit-task-id">
                        <div class="form-group">
                            <label for="edit-task-title" class="form-label" data-i18n="taskTitle">Task Title</label>
                            <input type="text" class="form-control" id="edit-task-title" required>
                        </div>
                        <div class="form-group">
                            <label for="edit-task-category" class="form-label" data-i18n="category">Category</label>
                            <select class="form-select" id="edit-task-category">
                                <option value="work" data-i18n="work">Work</option>
                                <option value="personal" data-i18n="personal">Personal</option>
                                <option value="shopping" data-i18n="shopping">Shopping</option>
                                <option value="health" data-i18n="health">Health</option>
                                <option value="other" data-i18n="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-task-priority" class="form-label" data-i18n="priority">Priority</label>
                            <select class="form-select" id="edit-task-priority">
                                <option value="low" data-i18n="low">Low</option>
                                <option value="medium" data-i18n="medium">Medium</option>
                                <option value="high" data-i18n="high">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-task-due-date" class="form-label" data-i18n="dueDate">Due Date</label>
                            <input type="date" class="form-control" id="edit-task-due-date">
                        </div>
                        <div class="form-group">
                            <label for="edit-task-description" class="form-label" data-i18n="description">Description</label>
                            <textarea class="form-control" id="edit-task-description" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="cancel">Cancel</button>
                    <button type="button" class="btn btn-primary" id="save-task-changes" data-i18n="saveChanges">Save Changes</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Scripts --> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
