<body>
  <!-- === Header === -->

    <nav>

      </div>

  </header>

  <!-- === Intro Contact === -->
  <section class="contact-section">
    <h1>CONTACT</h1>
    <h2>Parlons de votre projet</h2>

    <form action="#" method="POST" class="contact-form">
      <label for="name">Nom</label>
      <input type="text" id="name" name="name" placeholder="Votre nom" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Votre email" required />

      <label for="phone">Téléphone</label>
      <input type="tel" id="phone" name="phone" placeholder="Votre numéro" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Décrivez votre besoin..." rows="5" required></textarea>

      <button type="submit">Envoyer</button>
    </form>
  </section>

  <!-- === Footer === -->
  <footer>
    <div class="footer-container">
      <div class="footer-logo">
        <img src="Logo/DEVWC_300x300.png" alt="Logo DevWithCam" />
      </div>
      <div class="footer-links">
        <h3>Navigation</h3>

        </ul>
      </div>

        <h3>Contact</h3>
        <ul>
          <li><a href="https://www.linkedin.com/in/cameron-adao-683b031bb/" target="_blank">LinkedIn</a></li>
          <li><a href="mailto:devwithcam@outlook.com">devwithcam@outlook.com</a></li>
        </ul>
      </div>
    </div>
  </footer>
</body>
