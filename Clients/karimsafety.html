<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Crypto Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
    }
    @keyframes marquee {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-100%); }
    }
    .animate-marquee {
      animation: marquee 20s linear infinite;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-900 to-black text-white overflow-x-hidden">

  <!-- Section Hero -->
  <section class="relative min-h-screen flex flex-col items-center justify-center px-6">
    <div class="absolute top-6 w-full overflow-hidden">
      <div class="whitespace-nowrap animate-marquee text-gray-400 text-sm space-x-10">
        <span class="inline-block">BTC ₿</span>
        <span class="inline-block">ETH Ξ</span>
        <span class="inline-block">SOL ◎</span>
        <span class="inline-block">ADA ₳</span>
        <span class="inline-block">XRP ✕</span>
        <span class="inline-block">AVAX ◉</span>
      </div>
    </div>
    <h1 class="text-5xl md:text-6xl font-bold text-yellow-400 drop-shadow-lg z-10 text-center">Votre Pass Crypto Premium</h1>
    <p class="mt-6 text-lg text-gray-300 max-w-xl text-center z-10">
      Recevez gratuitement nos signaux d'achat/vente sur les cryptos à fort potentiel, adaptés à votre profil d'investisseur.
    </p>
    <a href="#form" class="mt-10 inline-block bg-yellow-400 text-gray-900 font-bold py-3 px-8 rounded-full shadow-xl hover:bg-yellow-300 transition z-10">
      🚀 Je veux les signaux !
    </a>
  </section>

  <!-- Section Formulaire -->
  <section id="form" class="py-20 px-6 bg-gray-900 border-t-4 border-yellow-400">
    <div class="max-w-2xl mx-auto bg-gray-800 p-12 rounded-3xl shadow-2xl">
      <h2 class="text-3xl font-bold text-center text-yellow-400 mb-6">Inscrivez-vous gratuitement</h2>
      <form class="space-y-6">
        <div>
          <label class="block text-sm font-medium">Prénom</label>
          <input type="text" class="mt-1 w-full px-4 py-2 rounded-md bg-gray-700 text-white" required>
        </div>
        <div>
          <label class="block text-sm font-medium">Nom</label>
          <input type="text" class="mt-1 w-full px-4 py-2 rounded-md bg-gray-700 text-white" required>
        </div>
        <div>
          <label class="block text-sm font-medium">Adresse e-mail</label>
          <input type="email" class="mt-1 w-full px-4 py-2 rounded-md bg-gray-700 text-white" required>
        </div>
        <div>
          <label class="block text-sm font-medium">Quel est votre capital d'investissement ?</label>
          <select class="mt-1 w-full px-4 py-2 rounded-md bg-gray-700 text-white">
            <option>Moins de 10 000€</option>
            <option>Entre 10 000€ et 50 000€</option>
            <option>Plus de 50 000€</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium">Que souhaitez-vous obtenir de notre stratégie ?</label>
          <textarea rows="4" class="mt-1 w-full px-4 py-2 rounded-md bg-gray-700 text-white" placeholder="Partagez vos attentes, besoins ou questions..."></textarea>
        </div>
        <button type="submit" class="w-full bg-yellow-400 text-gray-900 py-3 rounded-full font-semibold hover:bg-yellow-300 transition">
          Je m’inscris gratuitement
        </button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center text-gray-400 py-6 text-sm">
    © 2025 Crypto Premium Signals. Tous droits réservés.
  </footer>

</body>
</html>
